name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          github_token: ${{ github.token }}

      - name: Restore Flutter packages
        run: mise exec -- flutter pub get

      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat <<EOF > android/key.properties
          storeFile=app/upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build Android artifacts
        run: mise exec -- flutter build apk --release && mise exec -- flutter build appbundle --release

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=(
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          )

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
