name: upsnap_client
description: "Flutter client for UpSnap."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.0-210.2.beta

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  pocketbase: ^0.23.2
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  timeago: ^3.7.1
  url_launcher: ^6.3.2
  file_picker: ^10.3.10
  flutter_svg: ^2.2.4
  collection: ^1.19.1
  http: ^1.6.0
  cron_parser: ^0.5.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0

flutter:
  # the material Icons class.
  uses-material-design: true
  assets:
    - assets/gopher.svg
    - assets/avatars/
